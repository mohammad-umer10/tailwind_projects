<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Background Color</title>
</head>
<body>

    <button onclick="changeBackGroundToGreen()">Change Background Color to green</button>
    <button onclick="changeBackGroundToPink()">Change Background Color to pink</button>

    <script>
        function changeBackGroundToGreen() {
            document.body.style.backgroundColor = "green";
        }
        function changeBackGroundToPink() {
            document.body.style.backgroundColor = "pink";
        }
    </script>

</body>
</html>
